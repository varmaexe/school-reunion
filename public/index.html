<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Reunion</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%8E%93</text></svg>">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Figtree:wght@400;500;600;700&display=swap">
<style>
  :root {
    --bg: #f5ead8;
    --surface: #ebddc5;
    --text: #201e1d;
    --accent: #ffa31a;
    --accent-100: #fff3e0;
    --accent-200: #ffe0ad;
    --accent-700: #a35d00;
    --accent-800: #703f00;
    --good-100: #f0fae1;
    --good-800: #3d472b;
    --neutral-100: #f9f4ed;
    --neutral-200: #eee7db;
    --neutral-300: #dcd3c4;
    --neutral-600: #82796a;
    --neutral-700: #645c50;
    --divider: rgba(32, 30, 29, 0.16);
    --page-bg: #dcd3c4;
    --shadow: 0 12px 32px rgba(46, 43, 37, 0.22);
    --placeholder: rgba(32, 30, 29, 0.45);
    --font-heading: 'Caprasimo', system-ui, sans-serif;
    --font-body: 'Figtree', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #211c16;
      --surface: #2c2519;
      --text: #f2ebe0;
      --accent: #ffb84d;
      --accent-100: #3a2a10;
      --accent-200: #4d3714;
      --accent-700: #ffcf85;
      --accent-800: #ffe2b3;
      --good-100: #29331d;
      --good-800: #b7d68e;
      --neutral-100: #2c2519;
      --neutral-200: #362e21;
      --neutral-300: #453b2b;
      --neutral-600: #b3a891;
      --neutral-700: #cfc3ab;
      --divider: rgba(242, 235, 224, 0.14);
      --page-bg: #14110d;
      --shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
      --placeholder: rgba(242, 235, 224, 0.4);
    }
  }
  /* explicit overrides from the manual theme toggle — win over the system-preference media query above regardless of device setting */
  :root[data-theme="light"] {
    --bg: #f5ead8; --surface: #ebddc5; --text: #201e1d;
    --accent: #ffa31a; --accent-100: #fff3e0; --accent-200: #ffe0ad; --accent-700: #a35d00; --accent-800: #703f00;
    --good-100: #f0fae1; --good-800: #3d472b;
    --neutral-100: #f9f4ed; --neutral-200: #eee7db; --neutral-300: #dcd3c4; --neutral-600: #82796a; --neutral-700: #645c50;
    --divider: rgba(32, 30, 29, 0.16); --page-bg: #dcd3c4; --shadow: 0 12px 32px rgba(46, 43, 37, 0.22); --placeholder: rgba(32, 30, 29, 0.45);
  }
  :root[data-theme="dark"] {
    --bg: #211c16; --surface: #2c2519; --text: #f2ebe0;
    --accent: #ffb84d; --accent-100: #3a2a10; --accent-200: #4d3714; --accent-700: #ffcf85; --accent-800: #ffe2b3;
    --good-100: #29331d; --good-800: #b7d68e;
    --neutral-100: #2c2519; --neutral-200: #362e21; --neutral-300: #453b2b; --neutral-600: #b3a891; --neutral-700: #cfc3ab;
    --divider: rgba(242, 235, 224, 0.14); --page-bg: #14110d; --shadow: 0 12px 32px rgba(0, 0, 0, 0.45); --placeholder: rgba(242, 235, 224, 0.4);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  input, select, textarea, code {
    -webkit-user-select: text;
    user-select: text;
    -webkit-touch-callout: default;
  }
  body {
    margin: 0;
    background: var(--page-bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  input::placeholder, textarea::placeholder { color: var(--placeholder); }
  select { appearance: none; }
  button { font-family: var(--font-body); touch-action: manipulation; }

  #shell {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    background: var(--bg);
  }

  .h-heading { font-family: var(--font-heading); }
  .muted { opacity: 0.75; }
  .hidden { display: none !important; }

  /* gate */
  .gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 32px;
    gap: 22px;
    text-align: center;
    flex: 1;
    position: relative;
    z-index: 0;
  }
  .gate::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    background-image: url('/images/gate-background.jpg');
    background-size: cover;
    background-position: center;
    opacity: 0.14;
  }
  @media (prefers-color-scheme: dark) { .gate::before { opacity: 0.22; } }
  :root[data-theme="dark"] .gate::before { opacity: 0.22; }
  :root[data-theme="light"] .gate::before { opacity: 0.14; }
  .gate-photo {
    width: 120px; height: 120px; border-radius: 50%;
    box-shadow: 0 3px 10px rgba(46, 43, 37, 0.16);
    overflow: hidden;
    flex: none;
  }
  .gate-photo img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .eyebrow { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-700); margin-bottom: 8px; }
  .gate h1 { font-family: var(--font-heading); font-size: 26px; margin: 0 0 8px; line-height: 1.2; word-break: break-word; }
  .gate p.lede { margin: 0; font-size: 14px; opacity: 0.75; max-width: 300px; }
  .gate-form { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 14px; text-align: left; }

  label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.7; }
  .input, select.input {
    width: 100%; min-height: 46px; padding: 6px 16px; font: inherit; font-size: 15px;
    color: var(--text); background: var(--surface); border: 1px solid var(--divider); border-radius: 999px;
  }
  .error-text { font-size: 13px; color: var(--accent-700); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box;
    border: none; border-radius: 999px; background: var(--accent); color: var(--bg);
    font-family: var(--font-heading); font-size: 15px; cursor: pointer; min-height: 46px; padding: 10px 18px;
  }
  .btn.secondary { background: transparent; border: 1px solid var(--divider); color: var(--text); font-family: var(--font-body); font-size: 13px; min-height: 40px; }
  .btn.small { font-family: var(--font-body); font-size: 12px; min-height: 0; padding: 8px 14px; }
  .btn.block { width: 100%; }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .link-btn { background: transparent; border: none; color: var(--accent); font-family: var(--font-body); font-size: 13px; cursor: pointer; padding: 0; }

  /* shell header + nav */
  .topbar {
    display: flex; align-items: center; gap: 12px; padding: 16px 20px;
    position: sticky; top: 0; background: var(--bg); z-index: 5; border-bottom: 1px solid var(--divider);
  }
  .topbar .title { font-family: var(--font-heading); font-size: 18px; }
  .topbar .right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .pill { font-size: 11px; padding: 5px 12px; border-radius: 999px; }
  .pill.good { background: var(--good-100); color: var(--good-800); }
  .pill.neutral { background: var(--neutral-200); color: var(--neutral-700); }

  .hamburger-btn {
    border: none; background: transparent; color: var(--text); cursor: pointer;
    padding: 4px; display: flex; flex-direction: column; gap: 3px; justify-content: center; align-items: center;
    width: 28px; height: 28px; flex: none;
  }
  .hamburger-btn span { display: block; width: 18px; height: 2px; border-radius: 2px; background: var(--text); transition: transform 0.15s ease, opacity 0.15s ease; }
  .theme-btn { border: none; background: transparent; color: var(--text); cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; flex: none; }
  .theme-btn svg { width: 18px; height: 18px; display: block; }
  .gate-theme-btn { position: fixed; top: 14px; right: 14px; z-index: 10; }
  .menu-panel {
    position: absolute; top: 100%; right: 20px; margin-top: 6px; z-index: 20;
    background: var(--surface); border-radius: 18px; box-shadow: var(--shadow);
    display: flex; flex-direction: column; padding: 8px; min-width: 180px;
  }
  .menu-panel button {
    border: none; background: transparent; color: var(--text); text-align: left; font-size: 14px;
    padding: 11px 14px; border-radius: 12px; cursor: pointer; font-family: var(--font-body);
  }
  .menu-panel button.active { background: var(--accent-100); color: var(--accent-700); font-weight: 600; }

  .content { flex: 1; overflow-y: auto; padding: 20px 20px 24px; }

  .card { background: var(--surface); border-radius: 22px; padding: 18px; margin-bottom: 14px; }
  .card.tint { background: var(--accent-100); }
  .card-eyebrow { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .card.tint .card-eyebrow { color: var(--accent-700); }

  .rsvp-row { display: flex; gap: 8px; }
  .rsvp-row button { flex: 1; padding: 12px 8px; border-radius: 999px; border: 1px solid var(--divider); background: transparent; color: var(--text); font-family: var(--font-body); font-size: 14px; cursor: pointer; }
  .rsvp-row button.active { border-color: transparent; background: var(--accent); color: var(--bg); font-weight: 600; }
  .rsvp-row button.active.no { background: var(--neutral-600); }

  .upi-row { display: flex; align-items: center; gap: 8px; background: var(--bg); border-radius: 999px; padding: 8px 8px 8px 16px; margin-top: 4px; }
  .upi-row code { font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .upi-row button { border: none; border-radius: 999px; background: var(--accent); color: var(--bg); font-size: 12px; padding: 9px 14px; cursor: pointer; white-space: nowrap; }

  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-head .h-heading { font-size: 16px; }
  .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { font-size: 12px; padding: 6px 12px; border-radius: 999px; background: var(--neutral-100); color: var(--neutral-700); }

  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; }
  .filter-chip { flex: none; border: 1px solid var(--divider); background: transparent; color: var(--text); font-size: 13px; padding: 7px 14px; border-radius: 999px; cursor: pointer; opacity: 0.7; }
  .filter-chip.active { border-color: transparent; background: var(--accent); color: var(--bg); opacity: 1; font-weight: 600; }

  .budget-row { display: flex; justify-content: space-between; font-size: 13px; }
  .budget-row.total { font-size: 14px; font-weight: 600; }
  .budget-divider { height: 1px; background: rgba(198, 113, 57, 0.3); margin: 3px 0; }

  .stat-grid { display: flex; gap: 10px; margin-bottom: 16px; }
  .stat-tile { flex: 1; background: var(--surface); border-radius: 16px; padding: 12px; text-align: center; }
  .stat-tile .num { font-family: var(--font-heading); font-size: 19px; }
  .stat-tile .label { font-size: 10px; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.06em; }

  .list-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: var(--surface); border-radius: 16px; margin-bottom: 8px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--neutral-200); display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 13px; color: var(--neutral-700); flex: none; }
  .list-row .main { flex: 1; min-width: 0; }
  .list-row .name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-row .sub { font-size: 11px; opacity: 0.6; }
  .badge { font-size: 11px; padding: 6px 12px; border-radius: 999px; white-space: nowrap; border: none; cursor: default; }
  .badge.good { background: var(--good-100); color: var(--good-800); }
  .badge.neutral { background: var(--neutral-200); color: var(--neutral-700); }
  .badge.action { cursor: pointer; }

  .cat-row { margin-bottom: 10px; }
  .cat-row .top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .cat-bar { height: 6px; border-radius: 999px; background: var(--neutral-200); overflow: hidden; }
  .cat-bar > div { height: 100%; border-radius: 999px; background: var(--accent); }

  .exp-amount { font-size: 14px; font-family: var(--font-heading); white-space: nowrap; }
  .exp-actions { display: flex; gap: 10px; }
  .exp-actions button { border: none; background: transparent; color: var(--accent); font-size: 12px; cursor: pointer; padding: 4px 2px; text-decoration: underline; white-space: nowrap; }

  .bottom-nav { position: sticky; bottom: 0; display: flex; background: var(--bg); border-top: 1px solid var(--divider); padding: 10px 8px 14px; padding-bottom: max(14px, env(safe-area-inset-bottom)); z-index: 5; }
  .bottom-nav button { flex: 1; border: none; background: transparent; color: var(--text); opacity: 0.55; font-family: var(--font-body); font-size: 13px; padding: 6px; cursor: pointer; }
  .bottom-nav button.active { color: var(--accent-700); font-weight: 700; opacity: 1; }

  .overlay { position: fixed; inset: 0; display: grid; place-items: center; padding: 20px; background: rgba(46, 43, 37, 0.5); z-index: 30; }
  .modal { width: min(400px, 100%); max-height: 85vh; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding: 22px; border-radius: 26px; background: var(--surface); box-shadow: var(--shadow); }
  .modal-title { font-family: var(--font-heading); font-size: 19px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 2px; }

  .field-group { display: flex; flex-direction: column; gap: 12px; }
  .empty-note { text-align: center; padding: 14px; font-size: 13px; opacity: 0.65; }

  /* todo board */
  .todo-col { margin-bottom: 20px; }
  .todo-col-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .todo-col-head .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .todo-col-head .dot.planned { background: var(--accent); }
  .todo-col-head .dot.in_progress { background: #c9a227; }
  .todo-col-head .dot.dropped { background: var(--neutral-600); }
  .todo-col-head .h-heading { font-size: 15px; }
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: var(--surface); border-radius: 16px; margin-bottom: 8px; }
  .todo-item .title { flex: 1; font-size: 14px; }
  .todo-item select.status-select { width: auto; min-height: 34px; padding: 4px 10px; font-size: 12px; border-radius: 999px; }
  .todo-item button.remove { border: none; background: transparent; color: var(--accent-700); font-size: 12px; cursor: pointer; padding: 4px 2px; text-decoration: underline; white-space: nowrap; }

  /* misc board */
  .board-post { padding: 12px 14px; background: var(--surface); border-radius: 16px; margin-bottom: 8px; }
  .board-post .msg-text { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .board-post .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .board-post .author { font-size: 11px; opacity: 0.6; }
  .board-post button.remove { border: none; background: transparent; color: var(--accent-700); font-size: 11px; cursor: pointer; padding: 2px; text-decoration: underline; }
  .vote-row { display: flex; align-items: center; gap: 4px; }
  .vote-btn { border: none; background: transparent; color: var(--neutral-600); font-size: 15px; cursor: pointer; padding: 2px 6px; line-height: 1; }
  .vote-btn.active-up { color: var(--good-800); }
  .vote-btn.active-down { color: var(--accent-700); }
  .vote-score { font-size: 12px; min-width: 1.5em; text-align: center; opacity: 0.75; }
  textarea.input { min-height: 72px; padding: 10px 16px; border-radius: 18px; resize: vertical; font: inherit; }
  .misc-section { margin-bottom: 24px; }
  .misc-section-head { font-family: var(--font-heading); font-size: 16px; margin-bottom: 10px; }
  .misc-section-sub { font-size: 12px; opacity: 0.65; margin: -6px 0 10px; }
  .nav-card { display: block; width: 100%; text-align: left; border: none; cursor: pointer; font: inherit; color: inherit; }
</style>
<script>
  try {
    var storedTheme = localStorage.getItem("reunion_theme");
    if (storedTheme) document.documentElement.setAttribute("data-theme", storedTheme);
  } catch (e) {}
</script>
</head>
<body>
<div id="shell"></div>

<script>
(function () {
  "use strict";

  var IDENTITY_KEY = "reunion_identity";
  var PIN_KEY = "reunion_admin_pin";
  var DEVICE_SECRET_KEY = "reunion_payment_device_secret";
  var MY_VOTES_KEY = "reunion_my_votes";

  // Purely cosmetic — which arrow shows as "active" on this device. The
  // server is the source of truth for one-vote-per-member; this just avoids
  // re-fetching that to decide which button to highlight.
  function readMyVotes() {
    try {
      return JSON.parse(localStorage.getItem(MY_VOTES_KEY) || "{}");
    } catch (e) {
      return {};
    }
  }
  function writeMyVote(postId, vote) {
    var votes = readMyVotes();
    if (vote === 0) delete votes[postId];
    else votes[postId] = vote;
    localStorage.setItem(MY_VOTES_KEY, JSON.stringify(votes));
  }
  var THEME_KEY = "reunion_theme";

  var SUN_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>';
  var MOON_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';

  function effectiveTheme() {
    var stored = localStorage.getItem(THEME_KEY);
    if (stored === "light" || stored === "dark") return stored;
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }
  function themeToggleHTML(extraClass) {
    var current = effectiveTheme();
    var icon = current === "dark" ? SUN_ICON : MOON_ICON;
    var label = current === "dark" ? "Switch to light mode" : "Switch to dark mode";
    return '<button class="theme-btn' + (extraClass ? " " + extraClass : "") + '" id="theme-toggle" aria-label="' + label + '">' + icon + '</button>';
  }
  function bindThemeToggle() {
    var btn = document.getElementById("theme-toggle");
    if (!btn) return;
    btn.addEventListener("click", function () {
      var next = effectiveTheme() === "dark" ? "light" : "dark";
      localStorage.setItem(THEME_KEY, next);
      document.documentElement.setAttribute("data-theme", next);
      render();
    });
  }

  var state = {
    loaded: false,
    loadError: "",
    event: null,
    members: [],
    expenses: [],
    todos: [],
    posts: [],
    identity: readIdentity(),
    adminPin: sessionStorage.getItem(PIN_KEY) || "",
    paymentLog: null,
    paymentLogError: "",
    screen: "home",
    gateSelectedId: "",
    gateError: "",
    gateMode: "signin",
    joinError: "",
    gatePhoneInput: "",
    joinName: "",
    joinPhone: "",
    pinDialogOpen: false,
    pinError: "",
    attendeeSearch: "",
    attendeeFilter: "all",
    addExpenseOpen: false,
    editingExpenseId: null,
    expError: "",
    memberMsg: "",
    eventMsg: "",
    menuOpen: false,
    miscView: "hub",
    pocs: [],
    newPoc: { category: "", name: "" },
    pocError: "",
    showWelcome: false,
    newTodoTitle: "",
    todoError: "",
    boardForms: {
      proposal: { text: "", error: "" },
      kindwords: { text: "", error: "" },
      feedback: { text: "", error: "" },
    },
  };

  function readIdentity() {
    try {
      var raw = localStorage.getItem(IDENTITY_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }
  function writeIdentity(id) {
    state.identity = id;
    if (id) localStorage.setItem(IDENTITY_KEY, JSON.stringify(id));
    else localStorage.removeItem(IDENTITY_KEY);
  }

  function money(n) { return "₹" + Math.round(Number(n) || 0).toLocaleString("en-IN"); }
  // payment_phone is plain text, one contact per line as "Name: upi id or phone".
  // A line with no colon is shown with no name label.
  function paymentContacts() {
    var raw = (state.event && state.event.payment_phone) || "";
    return raw.split("\n").map(function (line) {
      line = line.trim();
      if (!line) return null;
      var idx = line.indexOf(":");
      if (idx === -1) return { name: "", value: line };
      return { name: line.slice(0, idx).trim(), value: line.slice(idx + 1).trim() };
    }).filter(Boolean);
  }
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function formatEventDate(s) {
    if (!s) return "";
    var d = new Date(s + "T00:00:00");
    if (isNaN(d.getTime())) return s;
    return d.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric", year: "numeric" });
  }
  function countdownLabel() {
    var s = state.event.event_date;
    if (!s) return "";
    var target = new Date(s + "T00:00:00");
    if (isNaN(target.getTime())) return "";
    var now = new Date();
    var startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var days = Math.round((target - startOfToday) / 86400000);
    if (days > 1) return days + " days to go";
    if (days === 1) return "Tomorrow!";
    if (days === 0) return "Today!";
    var ago = Math.abs(days);
    return ago + (ago === 1 ? " day ago" : " days ago");
  }

  async function api(path, options) {
    options = options || {};
    var headers = Object.assign({ "content-type": "application/json" }, options.headers || {});
    var res = await fetch(path, {
      method: options.method || "GET",
      headers: headers,
      body: options.body ? JSON.stringify(options.body) : undefined,
    });
    var data = await res.json().catch(function () { return {}; });
    if (!res.ok) throw new Error(data.error || ("Request failed (" + res.status + ")"));
    return data;
  }
  async function adminApi(path, body, method) {
    return api(path, { method: method || "POST", headers: { "X-Admin-Pin": state.adminPin }, body: body });
  }
  function currentUser() {
    if (!state.identity) return null;
    return state.members.find(function (m) { return String(m.id) === String(state.identity.memberId); }) || null;
  }
  function contributionAmount() { return (state.event && state.event.contribution_amount) || 0; }
  function totals() {
    var attendingCount = state.members.filter(function (m) { return m.rsvp_status === "yes"; }).length;
    var paidCount = state.members.filter(function (m) { return !!m.paid; }).length;
    var totalCollected = state.members.reduce(function (sum, m) { return sum + (m.paid ? Number(m.amount_paid || 0) : 0); }, 0);
    var totalExpenses = state.expenses.reduce(function (sum, e) { return sum + Number(e.amount || 0); }, 0);
    return { attendingCount: attendingCount, paidCount: paidCount, totalCollected: totalCollected, totalExpenses: totalExpenses, balance: totalCollected - totalExpenses };
  }

  async function loadEvent() {
    try {
      var data = await api("/api/event");
      state.event = data.event;
      state.members = data.members || [];
      state.expenses = data.expenses || [];
      state.todos = data.todos || [];
      state.posts = data.posts || [];
      state.pocs = data.pocs || [];
      state.loaded = true;
      state.loadError = "";
      if (state.identity && !currentUser()) writeIdentity(null);
    } catch (err) {
      state.loadError = err.message;
    }
    render();
  }

  // ---------------------------------------------------------------- render

  function render() {
    var shell = document.getElementById("shell");
    if (!state.loaded) {
      shell.innerHTML = '<div class="gate"><div class="h-heading" style="font-size:18px;">' +
        (state.loadError ? esc(state.loadError) : "Loading…") + "</div></div>";
      return;
    }
    if (!state.event) {
      shell.innerHTML = '<div class="gate"><h1>No event yet</h1><p class="lede">Ask an organizer to set up the reunion.</p></div>';
      return;
    }
    if (!state.identity) {
      shell.innerHTML = gateHTML();
      bindGate();
      return;
    }
    shell.innerHTML = shellHTML();
    bindShell();
  }

  // ---------------------------------------------------------------- gate

    var options = state.members

    var themeBtn = themeToggleHTML("gate-theme-btn");

          '</div>' +
          (state.gateError ? '<div class="error-text">' + esc(state.gateError) + '</div>' : "") +
          '<button id="gate-continue" class="btn block">Continue</button>' +

        '</div>' +

    );

  function bindGate() {
    bindThemeToggle();
    if (state.gateMode === "join") {
      document.getElementById("join-cancel").addEventListener("click", function () {
        state.gateMode = "signin";
        state.joinError = "";
        render();
      });
      document.getElementById("join-submit").addEventListener("click", async function () {
        var nameRaw = document.getElementById("join-name").value;
        var phoneRaw = document.getElementById("join-phone").value;
        state.joinName = nameRaw;
        state.joinPhone = phoneRaw;
        var name = nameRaw.trim();
        var phone = phoneRaw.trim().replace(/\D/g, "");
        if (!name) { state.joinError = "Enter your name."; return render(); }
        if (phone.length < 4) { state.joinError = "Enter a valid phone number."; return render(); }
        var btn = document.getElementById("join-submit");
        btn.disabled = true;
        try {
          var result = await api("/api/register", { method: "POST", body: { name: name, phone: phone } });
          writeIdentity({ memberId: result.id, phoneLast4: result.phone_last4 });
          state.gateMode = "signin";
          state.joinError = "";
          state.joinName = "";
          state.joinPhone = "";
          state.showWelcome = true;
          await loadEvent();
        } catch (err) {
          state.joinError = err.message;
          render();
        } finally {
          btn.disabled = false;
        }
      });
      return;
    }

    var memberSel = document.getElementById("gate-member");
    var phoneInput = document.getElementById("gate-phone");
    document.getElementById("join-open").addEventListener("click", function () {
      state.gateMode = "join";
      state.joinError = "";
      render();
    });
    document.getElementById("gate-continue").addEventListener("click", async function () {
      var memberId = memberSel.value;
      var phone = phoneInput.value.trim();
      state.gateSelectedId = memberId;
      state.gatePhoneInput = phoneInput.value;
      if (!memberId) { state.gateError = "Pick your name from the list."; return render(); }
      if (!/^\d{4}$/.test(phone)) { state.gateError = "Enter the last 4 digits of your phone number."; return render(); }
      var btn = document.getElementById("gate-continue");
      btn.disabled = true;
      try {
        await api("/api/identify", { method: "POST", body: { member_id: Number(memberId), phone_last4: phone } });
        writeIdentity({ memberId: Number(memberId), phoneLast4: phone });
        state.gateError = "";
        state.gatePhoneInput = "";
        state.screen = "home";
        state.showWelcome = true;
        render();
      } catch (err) {
        state.gateError = err.message;
        render();
      } finally {
        btn.disabled = false;
      }
    });
  }

  function attendeeListHTML() {
    var adminUnlocked = !!state.adminPin;

    var search = state.attendeeSearch.trim().toLowerCase();
    var filter = state.attendeeFilter;
    var rsvpLabel = { yes: "Coming", no: "Not coming", pending: "No response yet" };
    var list = state.members
      .filter(function (m) { return !search || m.name.toLowerCase().indexOf(search) !== -1; })
      .filter(function (m) { return filter === "all" || (m.rsvp_status || "pending") === filter; })
      .sort(function (a, b) { return a.name.localeCompare(b.name); });
    if (!list.length) return '<div class="empty-note">No matches.</div>';
    return list.map(function (m) {
      // Payment status is private between the person and organizers — no
      // one wants classmates seeing "who hasn't paid yet."

          '<div class="main"><div class="name">' + esc(m.name) + '</div><div class="sub">' + rsvpLabel[m.rsvp_status || "pending"] + '</div></div>' +
          badge +
        '</div>'
      );
    }).join("");
  }

  // ---------------------------------------------------------------- expenses

  function categoryBreakdown() {
    var totals = {};
    state.expenses.forEach(function (e) { totals[e.category || "Other"] = (totals[e.category || "Other"] || 0) + Number(e.amount || 0); });
    var max = Math.max(1, Object.values(totals).reduce(function (a, b) { return Math.max(a, b); }, 0));
    return Object.keys(totals)
      .map(function (cat) { return { category: cat, total: totals[cat] }; })
      .sort(function (a, b) { return b.total - a.total; })
      .map(function (c) { return { category: c.category, totalFmt: money(c.total), pct: Math.round((c.total / max) * 100) }; });
  }

  // ---------------------------------------------------------------- bind

  function bindShell() {
    bindThemeToggle();
    document.querySelectorAll("[data-nav]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.screen = btn.getAttribute("data-nav");
        if (state.screen === "misc") state.miscView = "hub";
        state.menuOpen = false;
        render();
      });
    });
    document.getElementById("switch-user").addEventListener("click", function () {
      writeIdentity(null);
      state.screen = "home";
      render();
    });
    document.getElementById("menu-toggle").addEventListener("click", function () {
      state.menuOpen = !state.menuOpen;
      render();
    });
    var backdrop = document.getElementById("menu-backdrop");
    if (backdrop) backdrop.addEventListener("click", function () { state.menuOpen = false; render(); });

    var openPinBtn = document.getElementById("open-pin");
    if (openPinBtn) openPinBtn.addEventListener("click", openPin);
    var openPinBtn2 = document.getElementById("open-pin-2");
    if (openPinBtn2) openPinBtn2.addEventListener("click", openPin);

    if (state.screen === "home") bindHome();
    if (state.screen === "attendees") bindAttendees();
    if (state.screen === "expenses") bindExpenses();
    if (state.screen === "todo") bindTodo();
    if (state.screen === "misc") bindMisc();
    if (state.screen === "organizer") bindOrganizer();
    if (state.pinDialogOpen) bindPinDialog();
    if (state.addExpenseOpen) bindExpenseDialog();
    if (state.showWelcome) bindWelcomeDialog();
  }

  function openPin() { state.pinDialogOpen = true; state.pinError = ""; render(); }

  function bindHome() {
    var user = currentUser();
    document.querySelectorAll("[data-rsvp]").forEach(function (btn) {
      btn.addEventListener("click", async function () {
        if (!user) return;
        var status = btn.getAttribute("data-rsvp");
        btn.disabled = true;
        try {
          await api("/api/rsvp", { method: "POST", body: { member_id: user.id, status: status, phone_last4: state.identity.phoneLast4 } });
          await loadEvent();
        } catch (err) {
          alert(err.message);
        } finally {
          btn.disabled = false;
        }
      });
    });
    document.querySelectorAll("[data-copy-value]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var value = btn.getAttribute("data-copy-value");
        navigator.clipboard && navigator.clipboard.writeText(value || "").catch(function () {});
        var original = btn.textContent;
        btn.textContent = "Copied";
        setTimeout(function () { btn.textContent = original; }, 1500);
      });
    });
  }

  function bindAttendees() {
    var search = document.getElementById("attendee-search");
    search.addEventListener("input", function () {
      state.attendeeSearch = search.value;
      document.getElementById("attendee-list").innerHTML = attendeeListHTML();
      bindAttendeeListActions();
    });
    document.querySelectorAll("[data-attendee-filter]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.attendeeFilter = btn.getAttribute("data-attendee-filter");
        render();
      });
    });
    bindAttendeeListActions();
  }
  function bindAttendeeListActions() {
    document.querySelectorAll("[data-toggle-paid]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = Number(btn.getAttribute("data-toggle-paid"));
        var member = state.members.find(function (m) { return m.id === id; });
        if (!member) return;
        performPaymentToggle(id, !member.paid);
      });
    });
  }

  // No PIN involved: the acting member must have can_manage_payments set on
  // their own row (grantable only via a direct DB query by the site owner —
  // see schema.sql). device_secret implements trust-on-first-use device
  // pinning, bound the first time this succeeds for a given person.
  async function performPaymentToggle(memberId, nextPaid) {
    if (!state.identity) { alert("Sign in first."); return; }
    try {
      var result = await api("/api/admin/payment", {
        method: "POST",
        headers: { "X-Admin-Pin": state.adminPin },
        body: {
          member_id: memberId,
          paid: nextPaid,
          amount: nextPaid ? contributionAmount() : 0,
          actor_member_id: state.identity.memberId,
          actor_phone_last4: state.identity.phoneLast4,
          device_secret: localStorage.getItem(DEVICE_SECRET_KEY) || "",
        },
      });
      if (result.device_secret) localStorage.setItem(DEVICE_SECRET_KEY, result.device_secret);
      await loadEvent();
    } catch (err) {
      alert(err.message);
    }
  }

  function bindExpenses() {
    var openBtn = document.getElementById("open-add-expense");
    if (openBtn) openBtn.addEventListener("click", function () {
      state.addExpenseOpen = true;
      state.editingExpenseId = null;
      state._expForm = { category: "Venue", description: "", amount: "" };
      state.expError = "";
      render();
    });
    document.querySelectorAll("[data-edit-expense]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = Number(btn.getAttribute("data-edit-expense"));
        var e = state.expenses.find(function (x) { return x.id === id; });
        if (!e) return;
        state.addExpenseOpen = true;
        state.editingExpenseId = id;
        state._expForm = { category: e.category || "Venue", description: e.description || "", amount: String(e.amount || "") };
        state.expError = "";
        render();
      });
    });
    document.querySelectorAll("[data-delete-expense]").forEach(function (btn) {
      btn.addEventListener("click", async function () {
        if (!confirm("Delete this expense?")) return;
        var id = btn.getAttribute("data-delete-expense");
        try {
          await adminApi("/api/admin/expense?id=" + id, null, "DELETE");
          await loadEvent();
        } catch (err) {
          alert(err.message);
        }
      });
    });
  }

  function bindExpenseDialog() {
    document.getElementById("close-add-expense").addEventListener("click", function () {
      state.addExpenseOpen = false;
      render();
    });
    document.getElementById("submit-expense").addEventListener("click", async function () {
      var category = document.getElementById("exp-category").value;
      var description = document.getElementById("exp-desc").value.trim();
      var amount = parseInt(document.getElementById("exp-amount").value, 10);
      if (!description) { state.expError = "Add a short description."; return render(); }
      if (!amount || amount <= 0) { state.expError = "Enter an amount greater than zero."; return render(); }
      var btn = document.getElementById("submit-expense");
      btn.disabled = true;
      try {
        if (state.editingExpenseId) {
          await adminApi("/api/admin/expense?id=" + state.editingExpenseId, null, "DELETE");
        }
        await adminApi("/api/admin/expense", { category: category, description: description, amount: amount });
        state.addExpenseOpen = false;
        state.editingExpenseId = null;
        state.expError = "";
        await loadEvent();
      } catch (err) {
        state.expError = err.message;
        render();
      } finally {
        btn.disabled = false;
      }
    });
  }

  function bindOrganizer() {
    loadPaymentLog();
    document.getElementById("lock-admin").addEventListener("click", function () {
      state.adminPin = "";
      sessionStorage.removeItem(PIN_KEY);
      state.screen = "home";
      render();
    });
    document.getElementById("new-member-submit").addEventListener("click", async function () {
      var name = document.getElementById("new-member-name").value.trim();
      var phone = document.getElementById("new-member-phone").value.trim();
      if (!name) { state.memberMsg = "Name is required."; return render(); }
      var btn = document.getElementById("new-member-submit");
      btn.disabled = true;
      try {
        await adminApi("/api/admin/member", { name: name, phone: phone || null });
        state.memberMsg = "";
        await loadEvent();
      } catch (err) {
        state.memberMsg = err.message;
        render();
      } finally {
        btn.disabled = false;
      }
    });
    document.getElementById("ev-save").addEventListener("click", async function () {
      var body = {
        name: document.getElementById("ev-name").value.trim(),
        venue: document.getElementById("ev-venue").value.trim(),
        maps_url: document.getElementById("ev-maps").value.trim(),
        event_date: document.getElementById("ev-date").value,
        contribution_amount: Number(document.getElementById("ev-amount").value) || 0,
        payment_phone: document.getElementById("ev-payment-phone").value.trim(),
        welcome_note: document.getElementById("ev-welcome").value.trim(),
      };
      var newPin = document.getElementById("ev-newpin").value.trim();
      if (newPin) body.new_admin_pin = newPin;
      var btn = document.getElementById("ev-save");
      btn.disabled = true;
      try {
        await adminApi("/api/admin/event", body);
        if (newPin) {
          state.adminPin = newPin;
          sessionStorage.setItem(PIN_KEY, newPin);
        }
        state.eventMsg = "";
        await loadEvent();
      } catch (err) {
        state.eventMsg = err.message;
        render();
      } finally {
        btn.disabled = false;
      }
    });
  }

  function bindTodo() {
    var addBtn = document.getElementById("new-todo-submit");
    if (addBtn) {
      addBtn.addEventListener("click", async function () {
        var input = document.getElementById("new-todo-title");
        var title = input.value.trim();
        if (!title) { state.todoError = "Enter a title first."; return render(); }
        addBtn.disabled = true;
        try {
          await adminApi("/api/admin/todo", { title: title });
          state.newTodoTitle = "";
          state.todoError = "";
          await loadEvent();
        } catch (err) {
          state.todoError = err.message;
          render();
        } finally {
          addBtn.disabled = false;
        }
      });
    }
    document.querySelectorAll("[data-todo-move]").forEach(function (sel) {
      sel.addEventListener("change", async function () {
        var id = Number(sel.getAttribute("data-todo-move"));
        var status = sel.value;
        if (!status) return;
        sel.disabled = true;
        try {
          await adminApi("/api/admin/todo", { id: id, status: status });
          await loadEvent();
        } catch (err) {
          alert(err.message);
        }
      });
    });
    document.querySelectorAll("[data-todo-delete]").forEach(function (btn) {
      btn.addEventListener("click", async function () {
        if (!confirm("Delete this todo?")) return;
        var id = btn.getAttribute("data-todo-delete");
        try {
          await adminApi("/api/admin/todo?id=" + id, null, "DELETE");
          await loadEvent();
        } catch (err) {
          alert(err.message);
        }
      });
    });
  }

  function bindMisc() {
    var backBtn = document.getElementById("misc-back");
    if (backBtn) backBtn.addEventListener("click", function () { state.miscView = "hub"; render(); });
    document.querySelectorAll("[data-misc-view]").forEach(function (btn) {
      btn.addEventListener("click", function () { state.miscView = btn.getAttribute("data-misc-view"); render(); });
    });
    var pocSubmitBtn = document.getElementById("poc-submit");
    if (pocSubmitBtn) {
      pocSubmitBtn.addEventListener("click", async function () {
        var category = document.getElementById("poc-category").value;
        var name = document.getElementById("poc-name").value;
        state.newPoc = { category: category, name: name };
        if (!category.trim() || !name.trim()) { state.pocError = "Category and name are required."; return render(); }
        pocSubmitBtn.disabled = true;
        try {
          await adminApi("/api/admin/poc", { category: category.trim(), name: name.trim() });
          state.newPoc = { category: "", name: "" };
          state.pocError = "";
          await loadEvent();
        } catch (err) {
          state.pocError = err.message;
          render();
        } finally {
          pocSubmitBtn.disabled = false;
        }
      });
    }
    document.querySelectorAll("[data-poc-delete]").forEach(function (btn) {
      btn.addEventListener("click", async function () {
        if (!confirm("Delete this contact?")) return;
        var id = btn.getAttribute("data-poc-delete");
        try {
          await adminApi("/api/admin/poc?id=" + id, null, "DELETE");
          await loadEvent();
        } catch (err) {
          alert(err.message);
        }
      });
    });
    document.querySelectorAll("[data-board-input]").forEach(function (ta) {
      ta.addEventListener("input", function () {
        var type = ta.getAttribute("data-board-input");
        state.boardForms[type].text = ta.value;
      });
    });
    document.querySelectorAll("[data-board-submit]").forEach(function (btn) {
      btn.addEventListener("click", async function () {
        var type = btn.getAttribute("data-board-submit");
        var form = state.boardForms[type];
        var text = form.text.trim();
        if (!text) { form.error = "Write something first."; return render(); }
        if (!state.identity) { form.error = "Sign in first."; return render(); }
        var body = {
          type: type,
          message: text,
          member_id: state.identity.memberId,
          phone_last4: state.identity.phoneLast4,
        };
        btn.disabled = true;
        try {
          await api("/api/board", { method: "POST", body: body });
          form.text = "";
          form.error = "";
          await loadEvent();
        } catch (err) {
          form.error = err.message;
          render();
        } finally {
          btn.disabled = false;
        }
      });
    });
    document.querySelectorAll("[data-post-delete]").forEach(function (btn) {
      btn.addEventListener("click", async function () {
        if (!confirm("Delete this post?")) return;
        var id = btn.getAttribute("data-post-delete");
        try {
          await adminApi("/api/board?id=" + id, null, "DELETE");
          await loadEvent();
        } catch (err) {
          alert(err.message);
        }
      });
    });
    document.querySelectorAll("[data-vote-post]").forEach(function (btn) {
      btn.addEventListener("click", async function () {
        if (!state.identity) { alert("Sign in first."); return; }
        var postId = Number(btn.getAttribute("data-vote-post"));
        var clicked = Number(btn.getAttribute("data-vote-value"));
        var myVotes = readMyVotes();
        var current = myVotes[postId] || 0;
        var next = current === clicked ? 0 : clicked;
        btn.disabled = true;
        try {
          await api("/api/board-vote", {
            method: "POST",
            body: { post_id: postId, vote: next, member_id: state.identity.memberId, phone_last4: state.identity.phoneLast4 },
          });
          writeMyVote(postId, next);
          await loadEvent();
        } catch (err) {
          alert(err.message);
        } finally {
          btn.disabled = false;
        }
      });
    });
  }

  function bindPinDialog() {
    document.getElementById("close-pin").addEventListener("click", function () {
      state.pinDialogOpen = false;
      render();
    });
    document.getElementById("submit-pin").addEventListener("click", async function () {
      var pin = document.getElementById("pin-input").value;
      if (!pin) return;
      var btn = document.getElementById("submit-pin");
      btn.disabled = true;
      var prevPin = state.adminPin;
      state.adminPin = pin;
      try {
        await adminApi("/api/admin/verify", null, "GET");
        sessionStorage.setItem(PIN_KEY, pin);
        state.pinDialogOpen = false;
        state.pinError = "";
        render();
      } catch (err) {
        state.adminPin = prevPin;
        state.pinError = err.message;
        render();
      } finally {
        btn.disabled = false;
      }
    });
  }

  function bindWelcomeDialog() {
    document.getElementById("close-welcome").addEventListener("click", function () {
      state.showWelcome = false;
      render();
    });
  }

  loadEvent();
})();
</script>
</body>
</html>
